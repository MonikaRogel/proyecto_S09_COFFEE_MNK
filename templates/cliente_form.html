{% extends "base.html" %}

{% block content %}
<style>
    .field small.error { color: #dc3545; }
    .field small.valid { color: #28a745; }
    .field small { display: block; margin-top: 5px; font-size: 0.875em; }
</style>

<div class="page-head">
    <h1>{% if cliente %}Editar{% else %}Nuevo{% endif %} Cliente</h1>
</div>

<form method="POST" class="form" id="form-cliente">
    <div class="form-grid">
        <label class="field">
            <span class="label">Nombre *</span>
            <input type="text" name="nombre" id="nombre" required
                   value="{{ cliente.nombre if cliente else '' }}"
                   pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ ]+"
                   title="Solo letras y espacios"
                   oninput="validarNombre(this)">
            <small class="form-text text-muted" id="nombre-msg">Solo letras y espacios.</small>
        </label>
        <label class="field">
            <span class="label">Cédula</span>
            <input type="text" name="cedula" id="cedula"
                   value="{{ cliente.cedula if cliente else '' }}"
                   pattern="\d{10}"
                   maxlength="10"
                   title="Debe tener exactamente 10 dígitos numéricos"
                   oninput="validarCedula(this)">
            <small class="form-text text-muted" id="cedula-msg">10 dígitos numéricos.</small>
        </label>
        <label class="field">
            <span class="label">Email</span>
            <input type="email" name="email" id="email"
                   value="{{ cliente.email if cliente else '' }}"
                   oninput="validarEmail(this)">
            <small class="form-text text-muted" id="email-msg">Formato de correo válido.</small>
        </label>
        <label class="field">
            <span class="label">Teléfono</span>
            <input type="text" name="telefono" id="telefono"
                   value="{{ cliente.telefono if cliente else '' }}"
                   pattern="09\d{8}"
                   maxlength="10"
                   title="Debe comenzar con 09 y tener 10 dígitos"
                   oninput="validarTelefono(this)">
            <small class="form-text text-muted" id="telefono-msg">Ej: 0991234567 (10 dígitos, empieza con 09).</small>
        </label>
    </div>
    <div class="form-actions">
        <a href="{{ url_for('clientes.index') }}" class="btn">Cancelar</a>
        <button type="submit" class="btn primary">Guardar</button>
    </div>
</form>

<script>
function mostrarMensaje(inputId, msgElementId, esValido, mensajeError, mensajeOk) {
    const input = document.getElementById(inputId);
    const msg = document.getElementById(msgElementId);
    if (input.value.length > 0 && !esValido) {
        msg.classList.add('error');
        msg.classList.remove('valid');
        msg.textContent = mensajeError;
        input.setCustomValidity(mensajeError);
    } else {
        msg.classList.remove('error');
        if (input.value.length > 0 && esValido) {
            msg.classList.add('valid');
            msg.textContent = mensajeOk + ' ✓';
        } else {
            msg.classList.remove('valid');
            msg.textContent = mensajeOk;
        }
        input.setCustomValidity('');
    }
}

function validarNombre(input) {
    const esValido = /^[A-Za-zÁÉÍÓÚáéíóúñÑ ]+$/.test(input.value);
    mostrarMensaje('nombre', 'nombre-msg', esValido, 'Solo letras y espacios.', 'Solo letras y espacios.');
}

function validarCedula(input) {
    const esValido = /^\d{10}$/.test(input.value);
    mostrarMensaje('cedula', 'cedula-msg', esValido, 'Debe ser exactamente 10 dígitos numéricos.', '10 dígitos numéricos.');
}

function validarTelefono(input) {
    const esValido = /^09\d{8}$/.test(input.value);
    mostrarMensaje('telefono', 'telefono-msg', esValido, 'Debe empezar con 09 y tener 10 dígitos.', 'Ej: 0991234567 (10 dígitos, empieza con 09).');
}

function validarEmail(input) {
    const esValido = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(input.value);
    mostrarMensaje('email', 'email-msg', esValido, 'Correo electrónico inválido.', 'Formato de correo válido.');
}

// Inicializar validaciones al cargar la página
document.addEventListener('DOMContentLoaded', function() {
    validarNombre(document.getElementById('nombre'));
    validarCedula(document.getElementById('cedula'));
    validarEmail(document.getElementById('email'));
    validarTelefono(document.getElementById('telefono'));
});
</script>
{% endblock %}
