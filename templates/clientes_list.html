{% extends "base.html" %}

{% block content %}
<div class="page-head">
    <h1>Usuarios</h1>
    <a class="btn primary" href="{{ url_for('usuarios.nuevo') }}">+ Nuevo Usuario</a>
</div>

<div class="table-wrap">
    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for u in usuarios %}
            <tr>
                <td>{{ u.id }}</td>
                <td>{{ u.nombre }}</td>
                <td>{{ u.mail }}</td>
                <td>
                    <a class="btn small" href="{{ url_for('usuarios.editar', id=u.id) }}">Editar</a>
                    <form method="post" action="{{ url_for('usuarios.eliminar', id=u.id) }}" class="form-inline" onsubmit="return confirm('¿Eliminar usuario?');">
                        <button class="btn-link" type="submit">Eliminar</button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" class="muted">No hay usuarios.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
