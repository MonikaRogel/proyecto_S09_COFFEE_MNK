{% extends "base.html" %}

{% block content %}
<div class="page-head">
    <h1>{% if producto %}Editar{% else %}Nuevo{% endif %} Producto</h1>
</div>

<form method="POST" class="form">
    <div class="form-grid">
        <label class="field">
            <span class="label">Slug *</span>
            <input type="text" name="slug" value="{{ producto.slug if producto else '' }}" required>
        </label>
        <label class="field">
            <span class="label">Nombre *</span>
            <input type="text" name="nombre" value="{{ producto.nombre if producto else '' }}" required>
        </label>
        <label class="field">
            <span class="label">Precio *</span>
            <input type="number" step="0.01" name="precio" value="{{ producto.precio if producto else '' }}" required>
        </label>
        <label class="field">
            <span class="label">Stock *</span>
            <input type="number" name="stock" value="{{ producto.stock if producto else '' }}" required>
        </label>
        <label class="field">
            <span class="label">URL de imagen</span>
            <input type="text" name="img" value="{{ producto.img if producto else '' }}">
        </label>
        <label class="field field-full">
            <span class="label">Descripción</span>
            <textarea name="descripcion" rows="3">{{ producto.descripcion if producto else '' }}</textarea>
        </label>
    </div>
    <div class="form-actions">
        <a href="{{ url_for('productos.admin') }}" class="btn">Cancelar</a>
        <button type="submit" class="btn primary">Guardar</button>
    </div>
</form>
{% endblock %}
