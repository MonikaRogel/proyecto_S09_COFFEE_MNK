{% extends "base.html" %}

{% block content %}
<div class="page-head">
    <h1>{% if usuario %}Editar{% else %}Nuevo{% endif %} Usuario</h1>
</div>

<form method="POST" class="form">
    <div class="form-grid">
        <label class="field">
            <span class="label">Nombre *</span>
            <input type="text" name="nombre" value="{{ usuario.nombre if usuario else '' }}" required>
        </label>
        <label class="field">
            <span class="label">Email *</span>
            <input type="email" name="mail" value="{{ usuario.mail if usuario else '' }}" required>
        </label>
        <label class="field">
            <span class="label">Teléfono</span>
            <input type="text" name="telefono" value="{{ usuario.telefono if usuario else '' }}" placeholder="Ej: 0991234567">
        </label>
        <label class="field">
            <span class="label">Contraseña {% if usuario %}(dejar en blanco para no cambiar){% endif %} *</span>
            <input type="password" name="password" {% if not usuario %}required{% endif %}>
        </label>
        <label class="field">
            <span class="label">Rol</span>
            <select name="rol">
                <option value="cliente" {% if usuario and usuario.rol == 'cliente' %}selected{% endif %}>Cliente</option>
                <option value="admin" {% if usuario and usuario.rol == 'admin' %}selected{% endif %}>Administrador</option>
            </select>
        </label>
    </div>
    <div class="form-actions">
        <a href="{{ url_for('usuarios.index') }}" class="btn">Cancelar</a>
        <button type="submit" class="btn primary">Guardar</button>
    </div>
</form>
{% endblock %}
